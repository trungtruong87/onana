<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ensora Health TPO Interview Prep</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0b0f1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e2d45;
    --accent: #00d4a8;
    --accent2: #4f8ef7;
    --accent3: #f7934f;
    --text: #e8edf5;
    --muted: #6b7a99;
    --tag-ai: #1a3a2e;
    --tag-ai-text: #00d4a8;
    --tag-story: #1a2a3e;
    --tag-story-text: #4f8ef7;
    --tag-collab: #2e2218;
    --tag-collab-text: #f7934f;
    --tag-trans: #2a1a3a;
    --tag-trans-text: #c084fc;
    --tag-process: #1a2a1a;
    --tag-process-text: #86efac;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,212,168,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,168,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative; z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* Header */
  header {
    margin-bottom: 48px;
  }
  .eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
  }
  header h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(28px, 5vw, 42px);
    line-height: 1.1;
    letter-spacing: -0.02em;
    color: var(--text);
  }
  header h1 span {
    color: var(--accent);
  }
  .subtitle {
    margin-top: 10px;
    color: var(--muted);
    font-size: 15px;
    font-weight: 300;
    max-width: 540px;
    line-height: 1.6;
  }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    margin: 28px 0 36px;
    padding: 16px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
  }
  .stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .stat-value {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
  }
  .stat-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .stat-divider { width: 1px; background: var(--border); }

  /* Filter bar */
  .filter-bar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 28px;
    align-items: center;
  }
  .filter-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-right: 4px;
  }
  .filter-btn {
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: var(--bg); font-weight: 500; }

  /* Progress */
  .progress-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 28px;
  }
  .progress-bar-bg {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.4s ease;
  }
  .progress-text {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
  }

  /* Card grid */
  .card-list {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* Flashcard */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;
    cursor: pointer;
  }
  .card:hover {
    border-color: rgba(0,212,168,0.3);
    box-shadow: 0 4px 32px rgba(0,212,168,0.07);
  }
  .card.revealed {
    border-color: rgba(79,142,247,0.3);
  }

  .card-header {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 20px 22px 18px;
  }
  .card-number {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    padding-top: 3px;
    min-width: 28px;
    letter-spacing: 0.08em;
  }
  .card-question-block { flex: 1; }
  .card-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }
  .tag {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 4px;
  }
  .tag-ai { background: var(--tag-ai); color: var(--tag-ai-text); }
  .tag-story { background: var(--tag-story); color: var(--tag-story-text); }
  .tag-collab { background: var(--tag-collab); color: var(--tag-collab-text); }
  .tag-trans { background: var(--tag-trans); color: var(--tag-trans-text); }
  .tag-process { background: var(--tag-process); color: var(--tag-process-text); }

  .card-question {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 16px;
    line-height: 1.45;
    color: var(--text);
  }

  .card-reveal-hint {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 22px 16px 64px;
    font-size: 12px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.06em;
  }
  .hint-icon {
    width: 16px; height: 16px;
    border: 1px solid var(--muted);
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .card.revealed .hint-icon {
    background: var(--accent2);
    border-color: var(--accent2);
    color: white;
  }

  /* Answer section */
  .card-answer {
    display: none;
    border-top: 1px solid var(--border);
    background: var(--surface2);
    padding: 22px 22px 22px 64px;
    animation: slideDown 0.25s ease;
  }
  .card.revealed .card-answer { display: block; }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .answer-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 12px;
  }
  .answer-text {
    font-size: 14.5px;
    line-height: 1.75;
    color: #c8d3e8;
    font-weight: 300;
  }
  .answer-text strong {
    color: var(--text);
    font-weight: 500;
  }
  .answer-text .highlight {
    color: var(--accent);
    font-weight: 500;
  }
  .answer-text ul {
    margin: 10px 0 10px 18px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .answer-text li::marker { color: var(--accent); }

  /* Pro tip */
  .pro-tip {
    margin-top: 16px;
    padding: 12px 14px;
    background: rgba(0,212,168,0.06);
    border-left: 3px solid var(--accent);
    border-radius: 0 6px 6px 0;
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
  }
  .pro-tip-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    display: block;
    margin-bottom: 4px;
  }

  /* Section dividers */
  .section-divider {
    display: flex;
    align-items: center;
    gap: 14px;
    margin: 36px 0 20px;
  }
  .section-divider-line { flex: 1; height: 1px; background: var(--border); }
  .section-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    white-space: nowrap;
    padding: 5px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
  }
  .section-title .num {
    color: var(--accent);
    margin-right: 6px;
    font-family: 'DM Mono', monospace;
  }

  /* Expand all */
  .toolbar {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    justify-content: flex-end;
  }
  .tool-btn {
    padding: 6px 16px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tool-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Mastered badge */
  .card-footer {
    display: none;
    padding: 10px 22px 14px 64px;
    gap: 10px;
    align-items: center;
    border-top: 1px solid var(--border);
  }
  .card.revealed .card-footer { display: flex; }
  .mark-btn {
    padding: 5px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--muted);
  }
  .mark-btn.mastered { border-color: var(--accent); color: var(--accent); background: rgba(0,212,168,0.08); }
  .mark-btn.review { border-color: var(--accent3); color: var(--accent3); background: rgba(247,147,79,0.08); }
  .mark-btn:hover { opacity: 0.8; }

  /* Mastered overlay */
  .card.is-mastered { opacity: 0.55; }
  .card.is-mastered .card-question { text-decoration: line-through; text-decoration-color: var(--muted); }

  @media (max-width: 600px) {
    .card-answer { padding-left: 22px; }
    .card-reveal-hint { padding-left: 22px; }
    .card-footer { padding-left: 22px; }
    .stats-bar { gap: 16px; }
    .stat-divider { display: none; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="eyebrow">// Interview Prep · Technical Round</div>
    <h1>Ensora Health <span>TPO</span><br/>Interview Flashcards</h1>
    <p class="subtitle">Technical development team round — focused on AI product depth, user stories, cross-functional collaboration, and engineering translation.</p>
  </header>

  <div class="stats-bar">
    <div class="stat"><span class="stat-value" id="total-count">20</span><span class="stat-label">Total Questions</span></div>
    <div class="stat-divider"></div>
    <div class="stat"><span class="stat-value" id="mastered-count">0</span><span class="stat-label">Mastered</span></div>
    <div class="stat-divider"></div>
    <div class="stat"><span class="stat-value" id="revealed-count">0</span><span class="stat-label">Reviewed</span></div>
    <div class="stat-divider"></div>
    <div class="stat"><span class="stat-value" id="pct">0%</span><span class="stat-label">Progress</span></div>
  </div>

  <div class="progress-row">
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
    <span class="progress-text" id="progress-label">0 / 20 mastered</span>
  </div>

  <div class="filter-bar">
    <span class="filter-label">Filter:</span>
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="ai">AI/ML Depth</button>
    <button class="filter-btn" data-filter="story">User Stories</button>
    <button class="filter-btn" data-filter="trans">Vision→Tech</button>
    <button class="filter-btn" data-filter="collab">Collaboration</button>
    <button class="filter-btn" data-filter="process">Process/Improvements</button>
  </div>

  <div class="toolbar">
    <button class="tool-btn" id="expand-all">Expand All</button>
    <button class="tool-btn" id="collapse-all">Collapse All</button>
  </div>

  <div class="card-list" id="card-list">
    <!-- Cards injected by JS -->
  </div>
</div>

<script>
const cards = [
  // ─── SECTION 1: AI TECHNICAL DEPTH ───
  {
    section: "AI & Technical Depth",
    tag: ["ai"],
    q: "Walk me through your understanding of NLP, ML, and LLMs. How would you apply each in a behavioral health product like Ensora's AI Session Assistant?",
    a: `<strong>NLP</strong> (Natural Language Processing) deals with understanding and generating human language — in Ensora's context, this powers things like transcribing therapy session notes, extracting clinical entities (diagnoses, symptoms, treatment goals), and sentiment analysis on session content.<br><br>
<strong>ML</strong> (traditional Machine Learning) is best for structured prediction problems — think billing code suggestion, session duration prediction, or identifying documentation gaps using historical data patterns.<br><br>
<strong>LLMs</strong> (Large Language Models) like GPT-class models excel at generating coherent long-form text from context — ideal for drafting SOAP notes, treatment plan summaries, or suggesting session narratives from sparse inputs.<br><br>
As TPO, I'd work with the AI/ML team to identify which capability solves which problem. For the Session Assistant, I'd expect an LLM layer handling note generation, with NLP preprocessing for entity extraction, and ML models handling quality scoring or anomaly flagging downstream.`,
    tip: "Anchor your answer in Ensora's actual product — the AI Session Assistant. Shows you did your homework."
  },
  {
    section: "AI & Technical Depth",
    tag: ["ai"],
    q: "What does a typical AI feature development lifecycle look like, and where does a TPO add the most value?",
    a: `The AI feature lifecycle goes roughly: <strong>problem framing → data assessment → model selection → training/fine-tuning → evaluation → deployment → monitoring → iteration</strong>.<br><br>
As TPO, I add the most value at three specific points:<br>
<ul>
  <li><strong>Problem framing:</strong> Translating vague business needs into a precise ML task definition (classification vs. generation vs. retrieval)</li>
  <li><strong>Evaluation criteria:</strong> Defining what "good enough" means before the model is built — precision/recall tradeoffs, latency thresholds, fallback behavior when confidence is low</li>
  <li><strong>Feedback loop design:</strong> Making sure the product captures the right user signals post-launch so the model improves over time</li>
</ul>
I keep the guardrails, not the gradients — but I need to understand both well enough to ask the right questions.`,
    tip: "The phrase 'I keep the guardrails, not the gradients' is memorable and technically honest."
  },
  {
    section: "AI & Technical Depth",
    tag: ["ai"],
    q: "How would you evaluate whether an AI-generated clinical note is 'good enough' to ship?",
    a: `I'd define evaluation criteria across three dimensions before we write a single line of training code:<br><br>
<strong>Clinical accuracy:</strong> Do the extracted entities (diagnoses, interventions, goals) match what the therapist actually discussed? This requires structured human review — likely a clinician sign-off sample — and metrics like precision/recall on key clinical terms.<br><br>
<strong>Functional completeness:</strong> Does the note satisfy payer documentation requirements? Are SOAP sections populated? Does it pass a structured rubric the compliance team defines?<br><br>
<strong>User acceptance:</strong> What percentage of AI-drafted notes are accepted without edits vs. heavily modified? High edit rates signal a model that's adding friction, not reducing it.<br><br>
I'd also design a staged rollout — beta cohort of willing therapists first — so we capture real-world data before GA. And critically, I'd ensure there's always a human-in-the-loop for the final note. The AI drafts; the clinician owns.`,
    tip: "Mentioning 'human-in-the-loop' for clinical output is critical — shows healthcare regulatory awareness."
  },
  {
    section: "AI & Technical Depth",
    tag: ["ai"],
    q: "What questions would you ask an AI/ML engineer to assess the feasibility of a new LLM-powered feature?",
    a: `My standard feasibility checklist for LLM features:<br>
<ul>
  <li><strong>Data:</strong> Do we have sufficient labeled examples, or are we relying on zero-shot/few-shot prompting?</li>
  <li><strong>Latency:</strong> What's the p95 response time? Is that acceptable for the UX context (real-time vs. async)?</li>
  <li><strong>Hallucination risk:</strong> What's the model's failure mode — and do we have a detection or fallback strategy?</li>
  <li><strong>Cost at scale:</strong> What's the per-call token cost, and how does that scale with our user base?</li>
  <li><strong>Fine-tuning vs. prompting:</strong> Can we get acceptable quality via prompt engineering, or do we need domain fine-tuning?</li>
  <li><strong>Compliance:</strong> Does the model or API vendor meet HIPAA BAA requirements?</li>
</ul>
These questions let me write an honest feasibility brief for product leadership without needing to run the experiments myself.`,
    tip: "HIPAA BAA question at the end signals healthcare domain awareness — will land well with this team."
  },
  {
    section: "AI & Technical Depth",
    tag: ["ai"],
    q: "How do you handle model drift or degradation post-deployment? What's your role as TPO?",
    a: `Model drift happens when the real-world data distribution shifts away from training data — in a behavioral health context, this could be changing therapy modalities, new billing codes, or evolving clinical documentation standards.<br><br>
As TPO, my role is to make sure we ship monitoring <em>with</em> the feature, not after the fact. That means:<br>
<ul>
  <li>Defining a performance baseline at launch (e.g., note acceptance rate, edit distance from draft to final)</li>
  <li>Working with engineering to set alerting thresholds that trigger a review cycle</li>
  <li>Building retraining or re-evaluation into the product roadmap as a recurring backlog item — not a one-off</li>
  <li>Designing feedback mechanisms in the UI so therapist corrections feed back into model improvement</li>
</ul>
The goal is to treat the model as a living product, not a shipped artifact.`,
    tip: "'Treat the model as a living product' — use this exact framing. It resonates with ML engineers."
  },

  // ─── SECTION 2: USER STORIES & ACCEPTANCE CRITERIA ───
  {
    section: "User Stories & Acceptance Criteria",
    tag: ["story"],
    q: "Write a user story and acceptance criteria for an AI feature that auto-generates a SOAP note from a therapy session transcript.",
    a: `<strong>User Story:</strong><br>
<em>As a licensed therapist, I want the system to automatically generate a draft SOAP note from my session transcript so that I can reduce post-session documentation time and focus more on client care.</em><br><br>
<strong>Acceptance Criteria:</strong><br>
<ul>
  <li>Given a completed session recording/transcript, when processing completes within 60 seconds of session end, then a structured SOAP note draft is surfaced in the documentation interface.</li>
  <li>The draft populates all four SOAP sections (Subjective, Objective, Assessment, Plan) with session-specific content — no placeholder text.</li>
  <li>Clinical entity accuracy (diagnoses, interventions, goals) meets or exceeds 85% match rate against clinician-reviewed ground truth in QA testing.</li>
  <li>The therapist can edit any section inline before signing; the original AI draft is preserved for audit.</li>
  <li>The feature is inaccessible if the session recording consent flag is not set — enforced at both UI and API layer.</li>
  <li>All session transcript data used for AI processing is transmitted and stored in compliance with HIPAA encryption standards.</li>
</ul>`,
    tip: "The consent flag and HIPAA AC items show you think like a healthcare TPO — not just a generic one."
  },
  {
    section: "User Stories & Acceptance Criteria",
    tag: ["story"],
    q: "How do you write acceptance criteria for an API integration where the behavior depends on a third-party service you don't fully control?",
    a: `This is a common challenge and requires AC that handles both the happy path <em>and</em> degraded states.<br><br>
My approach:<br>
<ul>
  <li><strong>Contract the expected interface:</strong> AC specifies the exact request/response schema, authentication method, and SLA we're designing against.</li>
  <li><strong>Define fallback behavior explicitly:</strong> "When the third-party API returns a 5xx error or times out after 3 seconds, the system surfaces a user-facing message and logs the failure for retry — it does not silently fail or lose data."</li>
  <li><strong>Test at the boundary:</strong> AC includes a test case for every documented error code from the third-party spec, not just the success scenario.</li>
  <li><strong>Version lock:</strong> AC notes which API version we're integrating against, so a vendor upgrade doesn't break our build silently.</li>
</ul>
I also insist on a contract test in CI — a lightweight test that mocks the third-party interface and validates our integration assumptions don't drift over time.`,
    tip: "Mentioning contract tests signals engineering maturity — this will resonate with a senior dev team."
  },
  {
    section: "User Stories & Acceptance Criteria",
    tag: ["story"],
    q: "How do you write a user story for a feature that has both a clinician-facing component and a data pipeline component that the end user never sees?",
    a: `I write two linked stories with a clear dependency marker.<br><br>
<strong>Enabler Story (technical/infrastructure):</strong><br>
<em>As the data platform, I need to ingest and normalize session transcript data from the recording service into a format suitable for LLM processing, so that the note generation feature has clean, consistent inputs.</em><br><br>
AC for the enabler covers data schema, latency, error handling, and PHI handling requirements.<br><br>
<strong>Feature Story (user-facing):</strong><br>
<em>As a therapist, I want a draft SOAP note ready for review within 60 seconds of session end...</em><br>
This story is explicitly marked "depends on [Enabler Story ID]" and only enters a sprint once the enabler is done or being done in parallel with a mocked interface.<br><br>
This keeps engineering unblocked while giving product a clear picture of what's a technical pre-condition vs. what delivers user value.`,
    tip: "The enabler story pattern is a SAFe concept — worth namedropping given the CSPO/SAFe POPM preference in the JD."
  },
  {
    section: "User Stories & Acceptance Criteria",
    tag: ["story"],
    q: "A developer says your acceptance criteria for an AI feature are too vague to implement. How do you respond?",
    a: `I say: <em>"Thank you — that's exactly the right flag to raise and I want to fix it before we pull this into a sprint."</em><br><br>
Then I schedule a 30-minute AC refinement session with that developer and the QA lead. The goal is to get to a shared definition of done that's testable and unambiguous.<br><br>
Common sources of vagueness in AI ACs:<br>
<ul>
  <li>"The output should be accurate" → replace with a specific metric and threshold</li>
  <li>"The system should handle errors gracefully" → replace with exact error conditions and expected system behavior for each</li>
  <li>"Performance should be acceptable" → replace with a p95 latency SLA</li>
</ul>
I treat developer pushback on ACs as a quality gate, not friction. If they can't implement from it, users can't test from it either.`,
    tip: "This answer shows psychological safety and engineering-first mindset — both valued in a dev team interview."
  },

  // ─── SECTION 3: VISION → TECHNICAL TRANSLATION ───
  {
    section: "Translating Vision ↔ Technical Constraints",
    tag: ["trans"],

// ── Render ──────────────────────────────────────────────────────────────────
const container = document.getElementById('card-list');
let currentFilter = 'all';

function getTagClass(tag) {
  const map = { ai: 'tag-ai', story: 'tag-story', trans: 'tag-trans', collab: 'tag-collab', process: 'tag-process' };
  return map[tag] || 'tag-ai';
}
function getTagLabel(tag) {
  const map = { ai: 'AI/ML', story: 'User Stories', trans: 'Vision↔Tech', collab: 'Collaboration', process: 'Process' };
  return map[tag] || tag;
}

function buildSection(title) {
  const div = document.createElement('div');
  div.className = 'section-divider';
  div.innerHTML = `<div class="section-divider-line"></div><div class="section-title"><span class="num">//</span>${title}</div><div class="section-divider-line"></div>`;
  return div;
}

function buildCard(card, idx) {
  const div = document.createElement('div');
  div.className = 'card';
  div.dataset.tags = card.tag.join(',');
  div.dataset.idx = idx;

  const tagsHtml = card.tag.map(t => `<span class="tag ${getTagClass(t)}">${getTagLabel(t)}</span>`).join('');
  const tipHtml = card.tip ? `<div class="pro-tip"><span class="pro-tip-label">⚡ Interview Tip</span>${card.tip}</div>` : '';

  div.innerHTML = `
    <div class="card-header">
      <span class="card-number">Q${String(idx+1).padStart(2,'0')}</span>
      <div class="card-question-block">
        <div class="card-tags">${tagsHtml}</div>
        <div class="card-question">${card.q}</div>
      </div>
    </div>
    <div class="card-reveal-hint">
      <div class="hint-icon">▶</div>
      <span>Click to reveal answer</span>
    </div>
    <div class="card-answer">
      <div class="answer-label">// Model Answer</div>
      <div class="answer-text">${card.a}${tipHtml}</div>
    </div>
    <div class="card-footer">
      <button class="mark-btn mastered" data-action="mastered">✓ Mastered</button>
      <button class="mark-btn review" data-action="review">↺ Needs Review</button>
    </div>
  `;

  div.querySelector('.card-header').addEventListener('click', () => toggleCard(div));
  div.querySelector('.card-reveal-hint').addEventListener('click', () => toggleCard(div));
  div.querySelectorAll('.mark-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      handleMark(div, btn.dataset.action);
    });
  });

  return div;
}

function toggleCard(div) {
  const isRevealed = div.classList.toggle('revealed');
  const hint = div.querySelector('.card-reveal-hint span');
  if (hint) hint.textContent = isRevealed ? 'Click to hide answer' : 'Click to reveal answer';
  updateStats();
}

function handleMark(div, action) {
  if (action === 'mastered') {
    div.classList.toggle('is-mastered');
  } else {
    div.classList.remove('is-mastered');
  }
  updateStats();
}

function updateStats() {
  const allVisible = [...document.querySelectorAll('.card')].filter(c => c.style.display !== 'none');
  const revealed = allVisible.filter(c => c.classList.contains('revealed')).length;
  const mastered = [...document.querySelectorAll('.card.is-mastered')].length;
  const total = cards.length;
  const pct = total > 0 ? Math.round((mastered / total) * 100) : 0;

  document.getElementById('total-count').textContent = total;
  document.getElementById('mastered-count').textContent = mastered;
  document.getElementById('revealed-count').textContent = revealed;
  document.getElementById('pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${mastered} / ${total} mastered`;
}

function render() {
  container.innerHTML = '';
  let lastSection = '';
  cards.forEach((card, idx) => {
    if (card.section !== lastSection) {
      container.appendChild(buildSection(card.section));
      lastSection = card.section;
    }
    const el = buildCard(card, idx);
    container.appendChild(el);
  });
  applyFilter(currentFilter);
  updateStats();
}

function applyFilter(filter) {
  currentFilter = filter;
  document.querySelectorAll('.card').forEach(c => {
    const tags = c.dataset.tags.split(',');
    c.style.display = (filter === 'all' || tags.includes(filter)) ? '' : 'none';
  });
  document.querySelectorAll('.section-divider').forEach(div => {
    // check if section has visible cards
    let sibling = div.nextElementSibling;
    let hasVisible = false;
    while (sibling && !sibling.classList.contains('section-divider')) {
      if (sibling.style.display !== 'none') hasVisible = true;
      sibling = sibling.nextElementSibling;
    }
    div.style.display = hasVisible ? '' : 'none';
  });
  updateStats();
}

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyFilter(btn.dataset.filter);
  });
});

// Expand / Collapse all
document.getElementById('expand-all').addEventListener('click', () => {
  document.querySelectorAll('.card').forEach(c => {
    if (c.style.display !== 'none') {
      c.classList.add('revealed');
      const hint = c.querySelector('.card-reveal-hint span');
      if (hint) hint.textContent = 'Click to hide answer';
    }
  });
  updateStats();
});
document.getElementById('collapse-all').addEventListener('click', () => {
  document.querySelectorAll('.card').forEach(c => {
    c.classList.remove('revealed');
    const hint = c.querySelector('.card-reveal-hint span');
    if (hint) hint.textContent = 'Click to reveal answer';
  });
  updateStats();
});

render();
</script>
